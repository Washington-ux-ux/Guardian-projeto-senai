<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian - Localizados</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="./assets/images/favicon.ico" type="image/x-icon">
</head>
<body>

    <div class="container">

        <div class="banner">
            <div class="logo-guardian">
                <img src="./assets/images/banner.png" alt="Logo Guardian">
            </div>

            <div class="logo-police">
                <img src="./assets/images/police.png" alt="Logo Police">
            </div>
            
        </div>

        
        <div class="navbar">
            <nav>
                <a href="./index.html">Home</a>
                <a href="./missing.html">Desaparecidos</a>
                <a href="./located.html">Localizados</a>
                <a href="./about.html">Sobre nós</a>
            </nav>
        </div>





        <div class="encounter">
            <div class="encounter-header">
                <h2>Lista de pessoas que nosso programa ajudou a encontrar</h2>
            </div>

            <div class="encounter-list" id="locatedList">
                <!-- Será adicionado via JavaScript -->
            </div>
        </div>







    </div>
    
    <script>
        let locatedData = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadLocatedData();
        });

        function loadLocatedData() {
            fetch('./src/data/located.json')
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    locatedData = data;
                    renderLocatedCards();
                })
                .catch(function(err) {
                    console.error('Erro ao carregar located.json:', err);
                });
        }

        function renderLocatedCards() {
            var list = document.getElementById('locatedList');
            if (!list) return;
            
            list.innerHTML = '';
            
            if (locatedData.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #f0f0f0;">Nenhuma pessoa localizada ainda.</p>';
                return;
            }
            
            var table = document.createElement('table');
            table.className = 'located-table';
            
            // Cabeçalho
            var thead = document.createElement('thead');
            thead.innerHTML = 
                '<tr>' +
                    '<th>Nome</th>' +
                    '<th>Idade</th>' +
                    '<th>Local</th>' +
                    '<th>Data</th>' +
                '</tr>';
            table.appendChild(thead);
            
            // Corpo
            var tbody = document.createElement('tbody');
            locatedData.forEach(function(person) {
                var tr = document.createElement('tr');
                tr.innerHTML = 
                    '<td>' + person.name + '</td>' +
                    '<td>' + person.age + '</td>' +
                    '<td>' + person.location.city + '</td>' +
                    '<td>' + new Date(person.foundAt || person.date).toLocaleDateString('pt-BR') + '</td>';
                tbody.appendChild(tr);
            });
            table.appendChild(tbody);
            
            list.appendChild(table);
        }
    </script>
</body>
</html>
